name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.2"

jobs:
  # ── Lint + Test (parallel, all pushes) ─────────────────

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: mix-${{ runner.os }}-${{ hashFiles('elixir/mix.lock') }}
      - run: mix deps.get
        working-directory: elixir
      - run: mix compile --warnings-as-errors
        working-directory: elixir
      - run: mix format --check-formatted
        working-directory: elixir

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: mix-${{ runner.os }}-${{ hashFiles('elixir/mix.lock') }}
      - run: mix deps.get
        working-directory: elixir
      - run: mix test --exclude spawn_process
        working-directory: elixir

  # ── Version check (main only) ─────────────────────────

  check-version:
    name: Check version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compare VERSION against latest tag
        id: check
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags — first release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "v${VERSION}" != "$LATEST_TAG" ]; then
            echo "Version changed: ${LATEST_TAG} → v${VERSION}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version unchanged (${LATEST_TAG}), skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build (only if version changed) ───────────────────

  build-escript:
    name: Build escript (macOS)
    runs-on: macos-15
    needs: [lint, test, check-version]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
      - run: mix deps.get
        working-directory: elixir
      - run: MIX_ENV=prod mix escript.build
        working-directory: elixir/apps/drawbridge_cli
      - uses: actions/upload-artifact@v4
        with:
          name: drawbridge-escript
          path: elixir/apps/drawbridge_cli/drawbridge

  build-swift:
    name: Build Swift agent (macOS)
    runs-on: macos-15
    needs: [lint, test, check-version]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - run: swift build -c release
        working-directory: swift
      - uses: actions/upload-artifact@v4
        with:
          name: drawbridge-agent
          path: swift/.build/release/DrawbridgeAgent

  # ── Release ────────────────────────────────────────────

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-escript, build-swift, check-version]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release
        run: |
          mkdir -p release
          cp artifacts/drawbridge-escript/drawbridge release/drawbridge
          cp artifacts/drawbridge-agent/DrawbridgeAgent release/drawbridge-agent
          chmod +x release/drawbridge release/drawbridge-agent
          cd release
          tar czf "../drawbridge-v${VERSION}-darwin-arm64.tar.gz" drawbridge drawbridge-agent

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

      - name: Extract changelog
        id: notes
        run: |
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          # Write to file to avoid quoting issues
          echo "$NOTES" > release_notes.md

      - name: Create GitHub release
        run: |
          gh release create "v${VERSION}" \
            "drawbridge-v${VERSION}-darwin-arm64.tar.gz" \
            --title "v${VERSION}" \
            --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
