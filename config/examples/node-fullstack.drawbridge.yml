# Node.js fullstack — API server + Postgres + Redis
# Typical setup for Express/Fastify/Next.js backends
domain: dev.local
idle_timeout: 300

services:
  # --- Backing services ---

  postgres:
    image: postgres:16
    hostname: postgres.dev.local
    ports:
      - "5432:5432"                # Port-routed (non-TLS)
    env:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: myapp_dev
    idle_timeout: 1800             # DB stays warm longer — cold boots are slow

  redis:
    image: redis:7
    hostname: redis.dev.local
    ports:
      - "6379:6379"
    idle_timeout: 1800

  # --- Application ---

  api:
    image: ghcr.io/yourorg/api:latest
    hostname: api.dev.local
    ports:
      - "443:3000"                 # TLS on 443, app listens on 3000
    env:
      DATABASE_URL: "postgres://postgres:dev@postgres.dev.local:5432/myapp_dev"
      REDIS_URL: "redis://redis.dev.local:6379"
      NODE_ENV: development
    depends_on: [postgres, redis]  # Boots postgres + redis before api starts
    boot_timeout: 15               # Node apps start fast
